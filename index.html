<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>index</title>
	<style>
		body{
			margin: 0;
		}
		a{
			text-decoration: none;
		}
		.base_div{
			height: 100dvh;
			background-color: #231f2b;
			scroll-snap-align: start;
			position: relative;
		}

		#first{
			overflow-y: scroll;
			scroll-snap-type: y mandatory;
			height: 100dvh;
		}

		.base_div h1 {
    		position: absolute;
    		top: 30%;
    		left: 50%;
    		transform: translateX(-50%);
    		color: #ffffff;
    		font-size: 3rem;
    		margin: 0;
		}

		.pill_box {
			width: 200px;
    		height: 55px;
    		position: absolute;
    		bottom: 25%; 
    		left: 50%;
    		transform: translateX(-50%); 
    		border-radius: 999px;
    		background: linear-gradient(to right, #8a2be2, #4b0082);
    		transition: all 0.3s ease;
    
    		display: flex;
    		justify-content: center;
    		align-items: center;
    		cursor: pointer; 

		}

		.pill_box p {
    		margin: 0;
    		font-weight: bold;
    		color: #ffffff;
		}

		.pill_box:hover {
    		width: 230px;
    		filter: brightness(0.85);
		}

		.pill_box .text_hover {
    		display: none;
		}

		.pill_box:hover .text_default {
    		display: none;
		}

		.pill_box:hover .text_hover {
    		display: inline;
		}

		.github_link {
			position: absolute;
			top: 90%;
			left: 50%;
			transform: translateX(-50%);
			color: #ffffff;
			font-size: 1.2rem;
			opacity: 0.7;
			transition: opacity 0.3s ease;
		}
		
		.github_link:hover {
			opacity: 1; 
		}

	</style>
</head>
<body>
	<div id="first">
		<div class="base_div">
			<div>
				<h1>자기소개 페이지</h1>
			</div>
			<a href="about.html" class="pill_box">
				<p>
					<span class="text_default">이원준이란?</span>
					<span class="text_hover">알아보기</span>
				</p>
			</a>
		</div>
		<div class="base_div">
			<a href="https://github.com/20251642-lwj/self_introduction" class="github_link" target="_blank" rel="noopener noreferrer">github로 가기</a>
		</div>
	</div>
	
</body>
</html>
